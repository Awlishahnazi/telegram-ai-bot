services:
  telegram-bot:
    build: .
    container_name: telegram-ai-bot

    env_file:
      - .env

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import asyncio, aiohttp; asyncio.run(aiohttp.ClientSession().close())\""]
      interval: 30s
      timeout: 10s
      retries: 3